<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>监控播放</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
iframe{width:100%;height:100%;border:none}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;cursor:pointer}
#overlay .icon{width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center}
#overlay .icon::after{content:'';display:block;width:0;height:0;border-style:solid;border-width:22px 0 22px 38px;border-color:transparent transparent transparent #fff;margin-left:8px}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="overlay" onclick="enterFullscreen()"><div class="icon"></div></div>
<iframe id="frame" allowfullscreen allow="autoplay;fullscreen"></iframe>
<script>
var targetUrl = new URLSearchParams(location.search).get('url');
if (targetUrl) document.getElementById('frame').src = targetUrl;

function enterFullscreen() {
  var el = document.documentElement;
  (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen).call(el).catch(function(){});
  try { if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(function(){}); } catch(e) {}
  document.getElementById('overlay').classList.add('hidden');
}

document.getElementById('frame').onload = function() {
  setTimeout(enterFullscreen, 800);
};

function onExit() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) history.back();
}
document.addEventListener('fullscreenchange', onExit);
document.addEventListener('webkitfullscreenchange', onExit);
</script>
</body>
</html>
